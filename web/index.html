<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>textmode</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="toolbar">
    <span id="logo">textmode<span class="cursor" aria-hidden="true">_</span></span>

    <span class="tsep" aria-hidden="true"></span>

    <label class="field">
      <span class="field-label">Example</span>
      <span class="select-wrap">
        <select id="example-select"></select>
      </span>
    </label>

    <span class="tsep" aria-hidden="true"></span>

    <label class="field">
      <span class="field-label">FPS</span>
      <input id="fps-input" type="number" min="1" max="120" step="1" value="30">
    </label>

    <span class="tsep" aria-hidden="true"></span>

    <label class="field">
      <input id="width-input" type="number" min="1" max="300" step="1" value="80" aria-label="Width">
      <span class="field-x" aria-hidden="true">&times;</span>
      <input id="height-input" type="number" min="1" max="150" step="1" value="25" aria-label="Height">
    </label>

    <span class="tsep" aria-hidden="true"></span>

    <div class="actions">
      <button id="run-btn" class="action action-run" title="Run (Ctrl/Cmd+Enter)">&#9654; Run</button>
      <button id="stop-btn" class="action action-stop" title="Stop">&#9632; Stop</button>
      <button id="share-btn" class="action" title="Copy a share link">&#10697; Share</button>
    </div>

    <div class="view-actions">
      <button id="layout-btn" class="action action-quiet" title="Toggle editor/preview layout">Layout</button>
      <button id="fullscreen-btn" class="action action-quiet" title="Fullscreen preview">Fullscreen</button>
    </div>

    <span id="status"></span>
  </header>

  <div class="hrule" aria-hidden="true"></div>

  <main id="panels">
    <section id="editor-panel">
      <div class="panel-head">
        <span class="panel-title">Editor</span>
        <span class="panel-rule" aria-hidden="true"></span>
      </div>
      <textarea id="editor"></textarea>
    </section>
    <section id="preview-panel">
      <div class="panel-head">
        <span class="panel-title">Preview</span>
        <span class="panel-rule" aria-hidden="true"></span>
      </div>
      <iframe id="preview" title="Preview" sandbox="allow-scripts" src="sandbox.html"></iframe>
    </section>
  </main>

  <div class="hrule" aria-hidden="true"></div>

  <footer id="log-bar">
    <span id="log-line"></span>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="examples.js"></script>
<script src="app.js"></script>
</body>
</html>
